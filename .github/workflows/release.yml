name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CI test suite
        run: npm run test:ci

      - name: Build desktop release artifacts
        run: npm run dist

      - name: Verify packaged artifacts
        run: |
          test -d release
          find release -maxdepth 2 -type f | sort

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astraforge-release-${{ github.run_number }}
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.rpm
            release/**/*.tar.gz
            release/**/*.zip
            release/**/*.yml
            release/**/*.blockmap

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.rpm
            release/**/*.tar.gz
            release/**/*.zip
            release/**/*.yml
            release/**/*.blockmap
          generate_release_notes: true
